<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">ClearPath Recovery Architecture Flow</title>
  <desc id="desc">Flow diagram showing business systems and network evidence collected, interpreted by agents, checked by deterministic policy, routed by UiPath Maestro Case, reviewed in Action Center when needed, and persisted into audit and eval proof.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#51606f"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 54px; font-weight: 800; fill: #17202a; letter-spacing: 0; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 25px; font-weight: 500; fill: #51606f; letter-spacing: 0; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 780; fill: #17202a; letter-spacing: 0; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 21px; font-weight: 500; fill: #46515c; letter-spacing: 0; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 650; fill: #5a6673; letter-spacing: 0; }
      .box { stroke-width: 2.5; rx: 18; filter: url(#shadow); }
      .source { fill: #ffffff; stroke: #c7d2df; }
      .agent { fill: #eef7ff; stroke: #4d9de0; }
      .policy { fill: #fff7e7; stroke: #f2a93b; }
      .maestro { fill: #f1edff; stroke: #7760d8; }
      .route { fill: #ffffff; stroke: #c7d2df; }
      .human { fill: #fff1f4; stroke: #df5d78; }
      .audit { fill: #ecfbf4; stroke: #36a36f; }
      .eval { fill: #eef2f7; stroke: #7b8794; }
      .line { fill: none; stroke: #51606f; stroke-width: 4; marker-end: url(#arrow); }
      .softline { fill: none; stroke: #8b98a8; stroke-width: 3; stroke-dasharray: 9 10; marker-end: url(#arrow); }
      .guardrail { fill: #17202a; }
      .guardrail-text { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 750; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1040"/>
  <text class="title" x="90" y="92">ClearPath Recovery: governed service recovery flow</text>
  <text class="subtitle" x="92" y="134">Agents interpret messy evidence. Deterministic policy decides. Maestro Case routes. Humans own high-impact exceptions.</text>

  <rect class="box source" x="90" y="220" width="330" height="145"/>
  <text class="label" x="120" y="266">Business systems</text>
  <text class="body" x="120" y="306">CRM, order, billing,</text>
  <text class="body" x="120" y="334">support notes</text>

  <rect class="box source" x="90" y="430" width="330" height="145"/>
  <text class="label" x="120" y="476">Authoritative evidence</text>
  <text class="body" x="120" y="516">Network telemetry,</text>
  <text class="body" x="120" y="544">inventory, activation state</text>

  <rect class="box source" x="505" y="315" width="315" height="165"/>
  <text class="label" x="535" y="360">Evidence collector</text>
  <text class="body" x="535" y="402">Normalizes source state,</text>
  <text class="body" x="535" y="430">freshness, authority,</text>
  <text class="body" x="535" y="458">and contradiction signals</text>

  <rect class="box agent" x="505" y="610" width="315" height="165"/>
  <text class="label" x="535" y="655">Agent interpretation</text>
  <text class="body" x="535" y="697">Messy notes become</text>
  <text class="body" x="535" y="725">closed-schema signals</text>
  <text class="small" x="535" y="755">Raw recommendation preserved</text>

  <rect class="box policy" x="900" y="410" width="330" height="185"/>
  <text class="label" x="930" y="456">Deterministic policy</text>
  <text class="body" x="930" y="498">Checks source authority,</text>
  <text class="body" x="930" y="526">freshness, contradiction,</text>
  <text class="body" x="930" y="554">confidence, policy version</text>

  <rect class="box maestro" x="1310" y="392" width="330" height="150"/>
  <text class="label" x="1340" y="438">UiPath Maestro Case</text>
  <text class="body" x="1340" y="480">Routes the case based on</text>
  <text class="body" x="1340" y="508">the policy decision</text>

  <rect class="box route" x="1270" y="665" width="245" height="118"/>
  <text class="label" x="1300" y="711">Verify telemetry</text>
  <text class="body" x="1300" y="748">Missing or stale</text>
  <text class="body" x="1300" y="774">authoritative signal</text>

  <rect class="box human" x="1535" y="665" width="245" height="118"/>
  <text class="label" x="1565" y="711">Human review</text>
  <text class="body" x="1565" y="748">Fresh contradiction</text>
  <text class="body" x="1565" y="774">or high-impact risk</text>

  <rect class="box audit" x="900" y="718" width="330" height="172"/>
  <text class="label" x="930" y="781">Audit + evidence</text>
  <text class="body" x="930" y="823">Linked agent event,</text>
  <text class="body" x="930" y="851">policy decision, route,</text>
  <text class="body" x="930" y="879">reviewer action</text>

  <rect class="box eval" x="90" y="735" width="330" height="150"/>
  <text class="label" x="120" y="781">Eval loop</text>
  <text class="body" x="120" y="823">E-001 through E-009</text>
  <text class="body" x="120" y="851">guard safety, usefulness,</text>
  <text class="body" x="120" y="879">and regressions</text>

  <path class="line" d="M 420 292 C 455 292 465 360 505 360"/>
  <path class="line" d="M 420 502 C 455 502 465 430 505 430"/>
  <path class="line" d="M 820 398 C 855 398 865 482 900 482"/>
  <path class="line" d="M 820 692 C 855 692 865 536 900 536"/>
  <path class="line" d="M 1230 500 C 1260 500 1280 468 1310 468"/>
  <path class="line" d="M 1475 542 C 1475 598 1395 600 1395 665"/>
  <path class="line" d="M 1510 542 C 1510 598 1658 600 1658 665"/>
  <path class="line" d="M 1065 595 L 1065 718"/>
  <path class="softline" d="M 420 810 C 640 810 695 570 900 570"/>

  <rect class="guardrail" x="90" y="945" width="1620" height="58" rx="18"/>
  <text class="guardrail-text" x="120" y="982">Guardrail: LLM/Codex recommendations are advisory. Policy owns closure decisions; Maestro routes the work; humans handle high-impact exceptions.</text>
</svg>
